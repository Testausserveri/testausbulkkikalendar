{{ define "query" }}
<form class="flex flex-col gap-2">
    <div class="input-group">
        <input type="text" name="query" id="searchQuery" placeholder=" " />
        <label for="searchQuery">Search</label>
    </div>
    <div class="input-group">
        <input type="date" name="dateStart" id="searchDateStart" placeholder=" " />
        <label for="searchDateStart">Start date</label>
    </div>
    <div class="input-group">
        <input type="date" name="dateEnd" id="searchDateEnd" placeholder=" " />
        <label for="searchDateEnd">End date</label>
    </div>
    <div class="input-group">
        <input type="number" name="maxResults" id="searchMaxResults" placeholder=" " />
        <label for="searchMaxResults">Result count</label>
    </div>
</form>
{{ end }}
